title: 梁家浩 | 个人主页
url: "https://LMKLJH.github.io"
baseurl: ""

# 用最稳的 minima 主题，和你 Gemfile 里的依赖一致
remote_theme: jekyll/minima@v3.0.0
plugins:
  - jekyll-remote-theme
  - jekyll-feed
  - jekyll-seo-tag

# 基础 Markdown 解析
markdown: kramdown
kramdown:
  parse_block_html: true

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
