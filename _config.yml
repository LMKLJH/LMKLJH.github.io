# 站点基础信息
title: 梁家浩 | 个人主页  
url: "https://LMKLJH.github.io"
baseurl: ""

# 关键：换掉 Minima 主题，用 Primer 主题（GitHub 同款）
remote_theme: pages-themes/primer@v0.6.0
# 关闭 Primer 主题的多余导航/标题
plugins:
  - jekyll-remote-theme  # 必须加这个插件，才能加载远程主题
  - jekyll-feed

# 表格渲染配置（Primer 主题原生支持 Markdown 表格）
markdown: kramdown
kramdown:
  parse_block_html: true

# 排除多余文件
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
