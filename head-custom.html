<!-- MathJax 配置：支持 LaTeX 公式渲染（适配 Primer 主题） -->
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
<script>
  // 核心配置：让浏览器识别 LaTeX 公式语法
  MathJax = {
    tex: {
      inlineMath: [['\\(', '\\)']],    // 行内公式：\( 公式 \)
      displayMath: [['\\[', '\\]']],   // 块级公式：\[ 公式 \]
      processEscapes: true,            // 支持转义字符，避免冲突
      macros: {                        // 兼容 LaTeX 中的 \text{中文} 语法
        \text: ['{\\mbox{#1}}', 1]
      }
    },
    svg: {
      fontCache: 'global'              // 缓存字体，加载更快
    },
    startup: {
      pageReady: () => {               // 页面加载完成后再渲染公式，避免报错
        return MathJax.startup.defaultPageReady().then(() => {
          console.log('MathJax 加载完成，公式可正常渲染');
        });
      }
    }
  };
</script>
